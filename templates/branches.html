{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white border-0 py-3">
                <h5 class="mb-0 fw-bold">Add Branch/Class</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Branch Name</label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="e.g. Computer Engineering">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill shadow-sm">Add Branch</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-0 py-3">
                <h5 class="mb-0 fw-bold">Branch List</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Branch Name</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for b in branches %}
                            <tr>
                                <td>{{ b.id }}</td>
                                <td class="fw-semibold">{{ b.name }}</td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="2" class="text-center text-muted py-4">No branches added yet.</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
