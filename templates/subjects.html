{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white border-0 py-3">
                <h5 class="mb-0 fw-bold">Add Subject</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Subject Name</label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="e.g. Database Systems">
                    </div>
                    <div class="mb-3">
                        <label for="branch" class="form-label">Assign to Branch</label>
                        <select class="form-select" id="branch" name="branch" required>
                            <option value="" selected disabled>Select a branch...</option>
                            {% for b in branches %}
                                <option value="{{ b.name }}">{{ b.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill shadow-sm">Add Subject</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-0 py-3">
                <h5 class="mb-0 fw-bold">Subject List</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Subject Name</th>
                                <th>Assigned Branch</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for s in subjects %}
                            <tr>
                                <td>{{ s.id }}</td>
                                <td class="fw-semibold">{{ s.name }}</td>
                                <td><span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 rounded-pill fw-normal">{{ s.branch }}</span></td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="3" class="text-center text-muted py-4">No subjects added yet.</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
